spring.datasource.url=jdbc:mysql://localhost:3306/electronic_invoicing?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${EINV_DB_USERNAME}
spring.datasource.password=${EINV_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# Hacienda placeholders
hacienda.auth.url=${HACIENDA_AUTH_URL:https://idp.comprobanteselectronicos.go.cr/auth/realms/rut}
hacienda.api.url=${HACIENDA_API_URL:https://api.comprobanteselectronicos.go.cr/recepcion}
hacienda.client.id=${HACIENDA_CLIENT_ID:changeme}
hacienda.username=${HACIENDA_USERNAME:changeme}
hacienda.password=${HACIENDA_PASSWORD:changeme}

# Security
security.jwt.secret=${JWT_SECRET:change-me-dev-secret}
security.jwt.expiration-seconds=3600

